name: Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-server:latest
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-server:v1.0.2
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-server:${{ github.sha }}

      - name: Build and push UI
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/webapp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-web:latest
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-web:v1.0.2
            ${{ env.REGISTRY }}/l3lackcurtains/dbbak-web:${{ github.sha }}
