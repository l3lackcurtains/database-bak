services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

  server:
    image: ghcr.io/l3lackcurtains/dbbak-server:v1.0.3
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "7301:7301"
    environment:
      - PORT=7301
      - NODE_ENV=production
      - DATABASE_MODE=${DATABASE_MODE:-turso}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TURSO_DB_URL=${TURSO_DB_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - redis

  ui:
    image: ghcr.io/l3lackcurtains/dbbak-web:v1.0.3
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "7300:7300"
    environment:
      - PORT=7300
      - API_URL=http://server:7301
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - server

networks:
  app-network:
    driver: bridge
